label: Swarm
description: N coders work independently → selector picks best → reviewer
stop_signal: DONE
definitions: definitions.yaml

groups:

  - name: coding
    roles:
      - role: architect
        count: 1
      - role: coder
        count: 3
        fan_out: true
        no_propagate: true
        responds_to: [TASK_READY]

  - name: selection
    roles:
      - role: selector
        count: 1

  - name: quality
    roles:
      - role: reviewer
        count: 1
